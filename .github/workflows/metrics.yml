name: Metrics
on:
  # Refresh every 6 hours and on push to main
  schedule: [{ cron: "0 */6 * * *" }]
  push: { branches: ["main"] }
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: joymadhu49
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dhaka

          # Lifetime stats — public + private + commits before joining counted
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: bytes-size, percentage
          plugin_followup: yes
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_achievements: yes
          plugin_achievements_threshold: C

          # Counts ALL commits ever, including private
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: ${{ secrets.METRICS_TOKEN_EMAIL }}
